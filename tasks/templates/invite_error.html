{% extends 'base.html' %}
{% block content %}
<div style="max-width:480px;margin:60px auto;text-align:center;">
    <div style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:20px;padding:40px;">
        <svg width="48" height="48" fill="none" stroke="#fca5a5" viewBox="0 0 24 24" style="margin:0 auto 16px;display:block;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        <h2 style="font-size:18px;font-weight:700;color:white;margin:0 0 8px;">Ошибка</h2>
        <p style="color:rgba(255,255,255,0.5);font-size:14px;margin:0 0 24px;">{{ error }}</p>
        <a href="{% url 'task_board' %}" style="padding:10px 24px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;">
            На главную
        </a>
    </div>
</div>
{% endblock %}
