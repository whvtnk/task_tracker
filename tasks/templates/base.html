<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Nunito', sans-serif; }
        body { background: #0f0a06; }

        .cursor-glow {
            pointer-events: none;
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(249,115,22,0.1) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            transition: left 0.12s ease, top 0.12s ease;
            z-index: 0;
        }

        .glass-nav {
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(249,115,22,0.1);
        }

        .nav-link {
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            transition: all 0.2s;
        }
        .nav-link:hover {
            background: rgba(249,115,22,0.1);
            color: #fb923c;
        }

        /* FAB */
        .fab-wrap { position: fixed; bottom: 32px; right: 32px; z-index: 100; }
        .fab-btn {
            width: 52px; height: 52px; border-radius: 50%;
            background: linear-gradient(135deg, #f97316, #fb923c);
            border: none;
            box-shadow: 0 0 24px rgba(249,115,22,0.5);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease; color: white;
            font-size: 22px; font-weight: 300;
        }
        .fab-btn:hover { box-shadow: 0 0 36px rgba(249,115,22,0.7); transform: scale(1.05); }
        .fab-icon { transition: transform 0.3s ease; display: inline-block; line-height: 1; }
        .fab-btn.open .fab-icon { transform: rotate(45deg); }

        .fab-options {
            position: absolute; bottom: 64px; right: 0;
            display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
            opacity: 0; transform: translateY(12px) scale(0.95);
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .fab-options.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: all; }

        .fab-opt {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 18px;
            background: rgba(20, 12, 5, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(249,115,22,0.2);
            border-radius: 50px;
            color: rgba(255,255,255,0.8);
            font-size: 13px; font-weight: 600;
            cursor: pointer; text-decoration: none; white-space: nowrap;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .fab-opt:hover { background: rgba(249,115,22,0.15); border-color: rgba(249,115,22,0.5); color: #fb923c; }
        .fab-opt.danger:hover { background: rgba(251,113,133,0.15); border-color: rgba(251,113,133,0.4); color: #fb7185; }

        .fab-opt-wrap { opacity: 0; transform: translateX(16px); transition: all 0.25s ease; }
        .fab-options.open .fab-opt-wrap:nth-child(1) { opacity:1; transform:translateX(0); transition-delay:0.05s; }
        .fab-options.open .fab-opt-wrap:nth-child(2) { opacity:1; transform:translateX(0); transition-delay:0.1s; }
        .fab-options.open .fab-opt-wrap:nth-child(3) { opacity:1; transform:translateX(0); transition-delay:0.15s; }
    </style>
</head>
<body class="min-h-screen text-white relative overflow-x-hidden">

    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Navbar -->
    <nav class="glass-nav sticky top-0 z-50">
        <div style="max-width:1200px;margin:0 auto;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;">

            <a href="{% url 'task_board' %}" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
                <div style="width:36px;height:36px;background:linear-gradient(135deg,#f97316,#fbbf24);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(249,115,22,0.4);">
                    <svg width="20" height="20" fill="none" stroke="white" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <span style="font-size:18px;font-weight:800;background:linear-gradient(135deg,#fb923c,#fbbf24);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">
                    Task Tracker
                </span>
            </a>

            <div style="display:flex;align-items:center;gap:4px;">
                <a href="{% url 'task_board' %}" class="nav-link">🏠 Моя доска</a>
                {% if request.user.is_superuser %}
                <a href="{% url 'analytics' %}" class="nav-link">📊 Аналитика</a>
                {% endif %}

                <div style="display:flex;align-items:center;gap:8px;margin-left:8px;padding:7px 14px;background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.2);border-radius:50px;">
                    <div style="width:26px;height:26px;background:linear-gradient(135deg,#f97316,#fbbf24);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:white;">
                        {{ request.user.username|first|upper }}
                    </div>
                    <span style="font-size:13px;font-weight:700;color:#fb923c;">{{ request.user.username }}</span>
                </div>
            </div>
        </div>
    </nav>

    <main style="max-width:1200px;margin:0 auto;padding:32px 24px;position:relative;z-index:10;">
        {% block content %}{% endblock %}
    </main>

    <!-- FAB -->
    <div class="fab-wrap">
        <div class="fab-options" id="fabOptions">
            {% if request.user.is_superuser %}
            <div class="fab-opt-wrap">
                <a href="{% url 'create_task' %}" class="fab-opt">
                    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Создать задачу
                </a>
            </div>
            <div class="fab-opt-wrap">
                <a href="{% url 'analytics' %}" class="fab-opt">
                    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                    Аналитика
                </a>
            </div>
            {% endif %}
            <div class="fab-opt-wrap">
                <a href="{% url 'logout' %}" class="fab-opt danger">
                    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    Выйти
                </a>
            </div>
        </div>
        <button class="fab-btn" id="fabBtn" onclick="toggleFab()">
            <span class="fab-icon">+</span>
        </button>
    </div>

    <script>
        const glow = document.getElementById('cursorGlow');
        document.addEventListener('mousemove', e => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        function toggleFab() {
            document.getElementById('fabBtn').classList.toggle('open');
            document.getElementById('fabOptions').classList.toggle('open');
        }

        document.addEventListener('click', e => {
            const fab = document.querySelector('.fab-wrap');
            if (!fab.contains(e.target)) {
                document.getElementById('fabBtn').classList.remove('open');
                document.getElementById('fabOptions').classList.remove('open');
            }
        });
    </script>
</body>
</html>
