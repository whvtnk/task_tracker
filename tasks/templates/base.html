<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Task Tracker</title>
    <style>
        /* Общие стили для всего сайта */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f3f4;
            margin: 0;
            padding: 0;
        }
        
        /* Стили для красивой шапки сайта (Навигации) */
        .navbar {
            background-color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3);
            margin-bottom: 40px;
        }

        .navbar-brand {
            font-size: 20px;
            font-weight: bold;
            color: #1a73e8; /* Фирменный синий цвет */
            text-decoration: none;
        }

        .nav-links a {
            margin-left: 20px;
            text-decoration: none;
            color: #5f6368;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: #1a73e8;
        }

        .user-profile {
            background-color: #e8f0fe;
            color: #1a73e8;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-left: 20px;
        }

        /* Контейнер для контента страниц */
        .container {
            display: flex;
            justify-content: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="#" class="navbar-brand">✓ Task Tracker</a>
        
        <div class="nav-links">
            <a href="{% url 'task_board' %}">Моя доска</a>
            
            {% if request.user.is_superuser %}
                <a href="{% url 'analytics' %}">Аналитика</a>
            {% endif %}

            <span class="user-profile">{{ request.user.username }}</span>
            
            <a href="{% url 'logout' %}">Выйти</a>
        </div>
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
