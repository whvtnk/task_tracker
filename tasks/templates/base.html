<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        'primary-dark': '#4f46e5',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .glass { backdrop-filter: blur(10px); background: rgba(255,255,255,0.8); }
        .task-card { transition: all 0.2s ease; }
        .task-card:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(99,102,241,0.15); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- Navbar -->
    <nav class="glass border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            
            <!-- Logo -->
            <a href="{% url 'task_board' %}" class="flex items-center gap-2 text-xl font-bold text-indigo-600 hover:text-indigo-700 transition-colors no-underline">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                Task Tracker
            </a>

            <!-- Nav Links -->
            <div class="flex items-center gap-2">
                <a href="{% url 'task_board' %}" 
                   class="px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 transition-all no-underline">
                    Моя доска
                </a>

                {% if request.user.is_superuser %}
                <a href="{% url 'analytics' %}" 
                   class="px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 transition-all no-underline">
                    Аналитика
                </a>
                {% endif %}

                <!-- User Badge -->
                <div class="flex items-center gap-2 ml-2 px-4 py-2 bg-indigo-50 rounded-full">
                    <div class="w-6 h-6 bg-indigo-600 rounded-full flex items-center justify-center">
                        <span class="text-white text-xs font-bold">{{ request.user.username|first|upper }}</span>
                    </div>
                    <span class="text-sm font-semibold text-indigo-700">{{ request.user.username }}</span>
                </div>

                <a href="{% url 'logout' %}" 
                   class="px-4 py-2 rounded-lg text-sm font-medium text-slate-500 hover:text-red-500 hover:bg-red-50 transition-all no-underline">
                    Выйти
                </a>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <main class="max-w-7xl mx-auto px-6 py-8">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
