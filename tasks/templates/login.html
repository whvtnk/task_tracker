<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход - Task Tracker</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f1f3f4; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15); 
            width: 320px; 
        }
        .login-card h2 { 
            margin-top: 0; 
            color: #202124; 
            font-size: 24px; 
            font-weight: 500; 
            margin-bottom: 30px; 
            text-align: center;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #5f6368; font-size: 14px; }
        .form-group input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #dadce0; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 16px; 
            outline: none; 
        }
        .form-group input:focus { border-color: #1a73e8; }
        .btn-login { 
            background-color: #1a73e8; 
            color: white; 
            border: none; 
            padding: 10px 24px; 
            font-size: 15px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            transition: background 0.2s; 
            margin-top: 10px;
        }
        .btn-login:hover { background-color: #1557b0; }
        .error-msg { 
            color: #d93025; 
            background: #fce8e6; 
            padding: 10px; 
            border-radius: 4px; 
            font-size: 13px; 
            margin-bottom: 20px; 
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Вход в Task Tracker</h2>
        
        {% if form.errors %}
            <div class="error-msg">Неверный логин или пароль. Попробуйте снова.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %} <div class="form-group">
                <label>Логин</label>
                <input type="text" name="username" required autofocus>
            </div>
            
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" required>
            </div>
            
            <button type="submit" class="btn-login">Войти</button>
            
        </form>
        </form> <div style="text-align: center; margin-top: 20px; font-size: 14px;">
            Нет аккаунта? <a href="{% url 'register' %}" style="color: #1a73e8; text-decoration: none; font-weight: 500;">Создать</a>
        </div>
    </div>

</body>
</html>
